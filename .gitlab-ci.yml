stages:
  - test
  - build

variables:
  SHMS_VPN_IMAGE_REPOSITORY: "${CI_REGISTRY_IMAGE}/shms-vpn"
  SHMS_VPN_CONTROL_API_IMAGE_REPOSITORY: "${CI_REGISTRY_IMAGE}/shms-vpn-control-api"
  SHMS_VPN_PLATFORMS: "linux/amd64,linux/arm64"
  SHMS_VPN_CONTROL_API_PLATFORMS: "linux/amd64"

test:vpn-control-api:
  stage: test
  image: python:3.11-slim
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install -r vpn/VPN_Control_API/requirements.txt pytest
  script:
    - pytest -q vpn/VPN_Control_API/tests

build:shms-vpn:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
      when: manual
      allow_failure: false
    - when: never
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker run --privileged --rm tonistiigi/binfmt --install amd64,arm64
    - docker buildx create --driver docker-container --use --name shms-builder
    - docker buildx inspect --bootstrap
  script:
    - test -f vpn/vpn/cisco-secure-client/cisco-secure-client-linux64-5.1.17.3382-predeploy-deb-k9.tgz
    - test -f vpn/vpn/cisco-secure-client/cisco-secure-client-linux-arm64-5.1.17.3382-predeploy-deb-k9.tgz
    - >
      docker buildx build
      --platform "$SHMS_VPN_PLATFORMS"
      --push
      --tag "$SHMS_VPN_IMAGE_REPOSITORY:$CI_COMMIT_SHA"
      ${CI_COMMIT_TAG:+--tag "$SHMS_VPN_IMAGE_REPOSITORY:$CI_COMMIT_TAG"}
      vpn/vpn

build:shms-vpn-control-api:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
      when: manual
      allow_failure: false
    - when: never
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx create --driver docker-container --use --name shms-control-builder
    - docker buildx inspect --bootstrap
  script:
    - >
      docker buildx build
      --platform "$SHMS_VPN_CONTROL_API_PLATFORMS"
      --push
      --tag "$SHMS_VPN_CONTROL_API_IMAGE_REPOSITORY:$CI_COMMIT_SHA"
      ${CI_COMMIT_TAG:+--tag "$SHMS_VPN_CONTROL_API_IMAGE_REPOSITORY:$CI_COMMIT_TAG"}
      vpn/VPN_Control_API
